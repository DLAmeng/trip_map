services:
  trip_map:
    image: ${TRIP_MAP_IMAGE:-ghcr.io/your-github-name/trip_map:latest}
    container_name: trip_map
    restart: unless-stopped
    environment:
      PORT: 8080
      NODE_ENV: production
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      # itinerary.json 可选 — host 没有时 Docker 会挂载空目录,
      # trip-service.js 自动兜底用空模板,不影响启动
      - ./itinerary.json:/app/itinerary.json
