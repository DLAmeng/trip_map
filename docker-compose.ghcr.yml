services:
  japan-trip:
    image: ${JAPAN_TRIP_IMAGE:-ghcr.io/your-github-name/japan-trip:latest}
    container_name: japan-trip
    restart: unless-stopped
    environment:
      PORT: 8080
      NODE_ENV: production
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./itinerary.json:/app/itinerary.json
