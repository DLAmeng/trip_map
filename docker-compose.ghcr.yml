services:
  trip_map:
    image: ${TRIP_MAP_IMAGE:-ghcr.io/your-github-name/trip_map:latest}
    container_name: trip_map
    restart: unless-stopped
    environment:
      PORT: 8080
      NODE_ENV: production
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./itinerary.json:/app/itinerary.json
