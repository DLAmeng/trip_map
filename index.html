<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>日本最终行程表</title>
  <link rel="preconnect" href="https://unpkg.com" crossorigin>
  <link rel="preconnect" href="https://tile.openstreetmap.org" crossorigin>
  <link rel="preconnect" href="https://maps.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://maps.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css">
  <link rel="stylesheet" href="./styles.css">
  <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script defer src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
  <script defer src="./runtime-config.js"></script>
  <script defer src="./app.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="site-header">
      <div class="header-copy">
        <span class="eyebrow">东京 → 富士山 → 京都 → 大阪</span>
        <h1 id="trip-title">日本最终行程表</h1>
        <p id="trip-desc">正在载入行程信息...</p>
      </div>

      <div class="header-stats" aria-label="行程摘要">
        <div class="stat-pill">
          <span id="trip-day-count">14</span>
          <small>天数</small>
        </div>
        <div class="stat-pill">
          <span id="trip-city-count">4</span>
          <small>城市</small>
        </div>
        <div class="stat-pill stat-pill-wide">
          <span id="trip-spot-count">44</span>
          <small>景点</small>
        </div>
      </div>

      <div class="header-actions">
        <select id="today-btn" class="pill-select" aria-label="选择聚焦天数">
          <option value="all">全部天数</option>
        </select>
        <button id="menu-btn" class="pill-btn menu-btn" type="button" aria-label="打开筛选">筛选</button>
      </div>
    </header>

    <section class="toolbar" aria-label="行程控制">
      <div class="filters filters-card" id="filters">
        <div class="filter-group">
          <span class="filter-label">天数</span>
          <button class="filter-btn active" data-filter="day" data-value="all" type="button">全部</button>
        </div>
        <div class="filter-group">
          <span class="filter-label">城市</span>
          <button class="filter-btn active" data-filter="city" data-value="all" type="button">全部</button>
        </div>
        <div class="filter-group">
          <span class="filter-label">偏好</span>
          <button class="filter-btn" data-filter="must" data-value="must" type="button">只看必去</button>
          <button class="filter-btn" data-filter="next" data-value="next" type="button">只看下一段</button>
        </div>
      </div>

      <div class="summary-bar" id="summary-bar">
        <div class="summary-pill">
          <span id="summary-count">0</span>
          <small>显示</small>
        </div>
        <div class="summary-pill">
          <span id="summary-days">0</span>
          <small>天数</small>
        </div>
        <div class="summary-pill">
          <span id="summary-cities">0</span>
          <small>城市</small>
        </div>
        <p class="summary-active" id="summary-active">当前显示完整路线。</p>
      </div>
    </section>

    <main class="main-content">
      <section class="map-stage">
        <div id="map" class="map-canvas" aria-label="行程地图"></div>
        <div class="map-notice" id="map-notice" hidden></div>

        <button id="mobile-filter-trigger" class="floating-filter" type="button">
          筛选面板
        </button>

        <div class="map-controls">
          <button class="ctrl-btn" id="reset-view" type="button" aria-label="重置地图视角">
            <span class="ctrl-icon">◎</span>
            <span class="ctrl-label">重置</span>
          </button>
          <button class="ctrl-btn" id="fit-day" type="button" aria-label="适配当天路线">
            <span class="ctrl-icon">◌</span>
            <span class="ctrl-label">适配当天</span>
          </button>
          <button class="ctrl-btn active" id="toggle-list" type="button" aria-label="切换日程列表">
            <span class="ctrl-icon">≡</span>
            <span class="ctrl-label">收起列表</span>
          </button>
        </div>

        <div class="legend" id="legend">
          <p class="legend-title">路线类型</p>
          <div class="legend-row">
            <div class="legend-line legend-line-walk"></div>
            <span>步行</span>
          </div>
          <div class="legend-row">
            <div class="legend-line legend-line-metro"></div>
            <span>地铁 / 电车</span>
          </div>
          <div class="legend-row">
            <div class="legend-line legend-line-bus"></div>
            <span>巴士</span>
          </div>
          <div class="legend-row">
            <div class="legend-line legend-line-shinkansen"></div>
            <span>Hikari 新干线</span>
          </div>
          <div class="legend-row">
            <div class="legend-line legend-line-jr"></div>
            <span>JR 新快速</span>
          </div>
          <div class="legend-row">
            <div class="legend-line legend-line-nankai"></div>
            <span>南海线 / Rapi:t</span>
          </div>
          <p class="legend-note" id="route-warning-note" hidden></p>
          <p class="legend-title legend-title-spaced">每日配色</p>
          <div id="legend-dots" class="legend-dots"></div>
        </div>
      </section>

      <aside class="day-list-panel" id="day-list-panel" aria-label="每日行程列表"></aside>
    </main>
  </div>

  <div class="mobile-drawer" id="mobile-drawer" aria-label="移动端行程抽屉">
    <div class="drawer-handle-wrap" id="drawer-drag-handle">
      <div class="drawer-handle"></div>
    </div>
    <div class="drawer-header" id="drawer-header">
      <div>
        <p class="drawer-kicker">行程抽屉</p>
        <p class="drawer-day-label" id="drawer-day-label">全部天数</p>
      </div>
      <p class="drawer-next-stop" id="drawer-next-stop"></p>
    </div>
    <div class="drawer-content" id="mobile-drawer-content"></div>
  </div>

  <div class="sheet-backdrop" id="sheet-backdrop" hidden></div>

  <div id="mobile-filter-sheet" aria-label="移动端筛选">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <p class="sheet-kicker">快速筛选</p>
      <h2>按你的方式看路线</h2>
    </div>
    <div class="sheet-section">
      <div class="sheet-section-title">天数</div>
      <div class="chip-row" id="mobile-day-chips"></div>
    </div>
    <div class="sheet-section">
      <div class="sheet-section-title">城市</div>
      <div class="chip-row" id="mobile-city-chips"></div>
    </div>
    <div class="sheet-section">
      <div class="filter-toggle-row">
        <button class="toggle-btn" id="mobile-must-toggle" type="button">只看必去</button>
        <button class="toggle-btn" id="mobile-next-toggle" type="button">只看下一段</button>
      </div>
    </div>
    <button id="close-filter-sheet" type="button">完成</button>
  </div>

  <div class="loading-screen" id="loading-screen" aria-live="polite">
    <div class="loading-card">
      <span class="eyebrow">正在整理路线</span>
      <strong>正在生成行程地图...</strong>
      <p id="loading-message">正在载入点位、路线和界面...</p>
    </div>
  </div>
</body>
</html>
