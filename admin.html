<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>日本行程后台编辑</title>
  <link rel="stylesheet" href="./admin.css">
  <script defer src="./trip-api.js"></script>
  <script defer src="./admin.js"></script>
</head>
<body>
  <div class="admin-shell">
    <header class="admin-header">
      <div>
        <p class="eyebrow">
          <a class="admin-back" id="admin-back-link" href="/dashboard">← 全部行程</a>
          <span class="admin-eyebrow-divider">·</span>
          <span id="admin-trip-badge" class="admin-trip-badge">后台编辑</span>
        </p>
        <h1 id="admin-trip-title">行程管理台</h1>
        <p class="header-copy" id="admin-header-copy">直接改标题、景点、路线和顺序，保存后前端地图会自动读取最新行程。</p>
      </div>
      <div class="header-actions">
        <a class="ghost-link" id="admin-open-front-link" href="/trip" target="_blank" rel="noreferrer">打开前台地图</a>
      </div>
    </header>

    <section class="topbar">
      <div class="status-card">
        <span class="status-label">状态</span>
        <strong id="status-text">正在加载行程...</strong>
        <small id="status-subtext">请稍候</small>
      </div>
      <div class="summary-grid">
        <div class="summary-card">
          <span id="trip-count-days">0</span>
          <small>天数</small>
        </div>
        <div class="summary-card">
          <span id="trip-count-spots">0</span>
          <small>景点</small>
        </div>
        <div class="summary-card">
          <span id="trip-count-segments">0</span>
          <small>路线</small>
        </div>
      </div>
    </section>

    <section class="action-bar">
      <button id="reload-btn" type="button">重新载入数据库</button>
      <button id="import-local-btn" type="button">用本地 itinerary.json 覆盖数据库</button>
      <button id="save-btn" type="button" class="primary">保存到数据库</button>
      <button id="save-export-btn" type="button">保存并写回 itinerary.json</button>
    </section>

    <main class="editor-layout">
      <section class="panel panel-meta">
        <div class="panel-head">
          <div>
            <p class="panel-kicker">基本信息</p>
            <h2>页面标题与描述</h2>
          </div>
        </div>
        <div class="field-grid field-grid-meta">
          <label class="field field-wide">
            <span>标题</span>
            <input id="meta-title" type="text" placeholder="日本最终行程表">
          </label>
          <label class="field field-wide">
            <span>描述</span>
            <textarea id="meta-description" rows="3" placeholder="14 天完整路线描述"></textarea>
          </label>
        </div>
      </section>

      <section class="panel panel-spots">
        <div class="panel-head">
          <div>
            <p class="panel-kicker">景点</p>
            <h2>景点与每天顺序</h2>
          </div>
          <div class="panel-actions">
            <button id="sort-spots-btn" type="button">按天数 + 顺序整理</button>
            <button id="add-spot-btn" type="button">新增景点</button>
          </div>
        </div>

        <div class="filters-row">
          <label class="field">
            <span>按天数筛选</span>
            <select id="day-filter">
              <option value="all">全部天数</option>
            </select>
          </label>
          <label class="field field-wide">
            <span>搜索景点</span>
            <input id="spot-search" type="search" placeholder="名称 / 城市 / 区域 / ID / 标签">
          </label>
        </div>

        <div class="section-note" id="spot-results-text">正在整理景点列表...</div>
        <div id="spot-list" class="card-list"></div>
      </section>

      <section class="panel panel-routes">
        <div class="panel-head">
          <div>
            <p class="panel-kicker">路线</p>
            <h2>景点之间的连接关系</h2>
          </div>
          <div class="panel-actions">
            <button id="sort-segments-btn" type="button">按天数整理路线</button>
            <button id="add-segment-btn" type="button">新增路线</button>
          </div>
        </div>

        <div class="filters-row">
          <label class="field">
            <span>按天数筛选</span>
            <select id="route-day-filter">
              <option value="all">全部天数</option>
            </select>
          </label>
          <label class="field field-wide">
            <span>搜索路线</span>
            <input id="segment-search" type="search" placeholder="label / 交通方式 / from / to / ID">
          </label>
        </div>

        <div class="section-note" id="segment-results-text">正在整理路线列表...</div>
        <div id="segment-list" class="card-list"></div>
      </section>
      <section class="panel panel-import">
        <div class="panel-head">
          <div>
            <p class="panel-kicker">批量导入</p>
            <h2>GPX / Google 列表导入</h2>
          </div>
          <div class="panel-actions">
            <button id="parse-import-btn" type="button">解析文件 / 链接</button>
            <button id="confirm-import-btn" type="button" class="primary" hidden>确认导入景点</button>
          </div>
        </div>

        <div class="import-grid">
          <div class="import-col">
            <p class="import-col-title">上传 GPX / KML 文件</p>
            <label class="import-file-label">
              <input id="batch-file-input" type="file" accept=".gpx,.kml,.kmz" multiple>
              <span class="import-file-text">点击选择文件（.gpx / .kml）</span>
            </label>
          </div>
          <div class="import-col">
            <p class="import-col-title">或粘贴 Google Maps 链接（每行一个）</p>
            <textarea id="batch-url-input" rows="4" placeholder="https://maps.google.com/maps?q=...&#10;https://maps.google.com/..."></textarea>
          </div>
        </div>

        <div class="import-day-row">
          <label class="field">
            <span>导入到第几天</span>
            <select id="import-day-select">
              <option value="1">第 1 天</option>
            </select>
          </label>
        </div>

        <div id="import-preview" class="import-preview" hidden></div>
      </section>
    </main>
  </div>
</body>
</html>
